<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Expense | SmartExpense</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link 
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" 
        rel="stylesheet">

    <!-- Bootstrap -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
        rel="stylesheet">

    <!-- Font Awesome -->
    <link 
        rel="stylesheet" 
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
<div class="app-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <i class="fa-solid fa-wallet"></i>
      <span>SmartExpense</span>
    </div>

    <nav class="menu">
      <a href="dashboard.html"><i class="fa-solid fa-house"></i> Dashboard</a>
     <a href="add_expense.html" class="active">
        <i class="fa-solid fa-plus"></i>
        Add Expense
      </a>
      <a href="auto_import.html"><i class="fa-solid fa-file-import"></i> Auto Import</a>
      <a href="lending.html"><i class="fa-solid fa-users"></i> Lending</a>
      <a href="reminders.html"><i class="fa-solid fa-bell"></i> Reminders</a>
      <a href="analytics.html"><i class="fa-solid fa-chart-line"></i> Analytics</a>
       <a href="khata.html">
    <i class="fa-solid fa-book"></i>
    Khata
</a>
      <a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a>
    </nav>

    <button id="logoutBtn" class="logout">
      <i class="fa-solid fa-right-from-bracket"></i> Logout
    </button>
  </aside>

  <!-- MAIN CONTENT -->
    <main class="main-content">


<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark custom-navbar">
    <div class="container">
        <a class="navbar-brand" href="dashboard.html">SmartExpense</a>
        <a href="dashboard.html" class="btn btn-outline-light btn-sm">Back</a>
    </div>
</nav>

<main class="container my-5">

    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <!-- AI Hint -->
            <div class="card card-highlight glow p-3 mb-3 fade-in">
                <div class="d-flex align-items-center">
                    <div class="icon-circle me-3">
                        <i class="fa-solid fa-brain"></i>
                    </div>
                    <p class="mb-0 small">
                        SmartExpense will automatically categorize your expense
                        using AI if you leave the category empty.
                    </p>
                </div>
            </div>

            <!-- Add Expense Card -->
            <div class="card p-4 fade-in">

                <h4 class="text-center mb-1">
                    <i class="fa-solid fa-plus me-2"></i>Add Expense
                </h4>
                <p class="text-center text-muted small mb-3">
                    Log your spending in seconds
                </p>

                <form id="expenseForm">

                    <!-- Amount -->
                    <div class="mb-2">
                        <label for="amount" class="form-label">
                            Amount (₹)
                        </label>
                        <input 
                            type="number" 
                            id="amount" 
                            class="form-control"
                            placeholder="e.g. 250"
                            required
                        >
                    </div>

                    <!-- Category -->
                    <div class="mb-2">
                        <label for="category" class="form-label">
                            Category
                            <span class="badge bg-light text-dark ms-1">
                                Optional
                            </span>
                        </label>
                        <select id="category" class="form-select">
                            <option value="">Let AI decide 🤖</option>
                            <option>Food 🍽️</option>
                            <option>Transport 🚗</option>
                            <option>Shopping 🛍️</option>
                            <option>Rent 🏠</option>
                            <option>Entertainment 🎬</option>
                            <option>Other 📌</option>
                        </select>
                    </div>

                    <!-- Payment Mode -->
                    <div class="mb-2">
                        <label for="paymentMode" class="form-label">
                            Payment Mode
                        </label>
                        <select id="paymentMode" class="form-select">
                            <option value="">Select mode</option>
                            <option>Cash 💵</option>
                            <option>UPI 📱</option>
                            <option>Card 🟦</option>
                        </select>
                    </div>

                    <!-- Description -->
                    <div class="mb-2">
                        <label for="description" class="form-label">
                            Description
                        </label>
                        <input 
                            type="text" 
                            id="description" 
                            class="form-control"
                            placeholder="e.g. Lunch with friends"
                        >
                    </div>

                    <!-- Date -->
                    <div class="mb-3">
                        <label for="date" class="form-label">
                            Date
                        </label>
                        <input 
                            type="date" 
                            id="date" 
                            class="form-control"
                        >
                    </div>

                    <button type="submit" class="btn btn-brand w-100">
                        Save Expense
                    </button>

                </form>

            </div>
        </div>
    </div>
</main>

<script src="js/expense.js"></script>

<!-- Auto-fill today -->
<script>
    document.getElementById("date").value =
        new Date().toISOString().split("T")[0];
</script>
  </main>
</div>

</body>
</html>
