<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Khata Ledger | SmartExpense</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="app-layout">

<!-- Sidebar -->

<aside class="sidebar">

<div class="brand">

<i class="fa-solid fa-wallet"></i>

<span>SmartExpense</span>

</div>

<nav class="menu">

<a href="dashboard.html"><i class="fa fa-house"></i> Dashboard</a>
<a href="add_expense.html"><i class="fa fa-plus"></i> Add Expense</a>
<a href="auto_import.html"><i class="fa-solid fa-file-import"></i> Auto Import</a>

<a href="lending.html"><i class="fa fa-users"></i> Lending</a>

<a href="reminders.html"><i class="fa fa-bell"></i> Reminders</a>
<a href="analytics.html"><i class="fa fa-chart-line"></i> Analytics</a>

<a href="khata.html" class="active">
    <i class="fa-solid fa-book"></i>
    Khata
</a>

<a href="settings.html">

<i class="fa fa-gear"></i>

Settings

</a>

</nav>

<button class="logout" id="logoutBtn">

<i class="fa fa-right-from-bracket"></i>

Logout

</button>

</aside>

<!-- Main -->

<main class="main-content">

<nav class="navbar custom-navbar navbar-dark rounded mb-4">

<div class="container-fluid">

<span class="navbar-brand">

Khata Ledger

</span>

</div>

</nav>

<!-- Summary -->

<div class="row mb-4">

<div class="col-md-4">

<div class="card p-4">

<h6>Total Given</h6>

<h2 id="totalGiven">₹0</h2>

</div>

</div>

<div class="col-md-4">

<div class="card p-4">

<h6>Total Received</h6>

<h2 id="totalReceived">₹0</h2>

</div>

</div>

<div class="col-md-4">

<div class="card p-4">

<h6>Balance</h6>

<h2 id="balance">₹0</h2>

</div>

</div>

</div>

<!-- Add Transaction -->

<div class="card p-4 mb-4">

<h4 class="mb-3">

Add Transaction

</h4>

<div class="row g-3">

<div class="col-md-3">

<input

id="person"

class="form-control"

placeholder="Person Name">

</div>

<div class="col-md-3">

<input

id="desc"

class="form-control"

placeholder="Description">

</div>

<div class="col-md-2">

<input

id="amount"

type="number"

class="form-control"

placeholder="Amount">

</div>

<div class="col-md-2">

<select

id="type"

class="form-select">

<option value="gave">

You Gave

</option>

<option value="received">

You Received

</option>

</select>

</div>

<div class="col-md-2 d-grid">

<button

onclick="addKhata()"

class="btn btn-brand">

Add

</button>

</div>

</div>

</div>

<!-- Transactions -->

<div class="card p-4">

<h4 class="mb-3">

Transactions

</h4>

<div class="table-responsive">

<table class="table table-hover align-middle">

<thead>

<tr>

<th>Person</th>

<th>Description</th>

<th>Amount</th>

<th>Type</th>

<th>Date</th>

</tr>

</thead>

<tbody id="khataList">

<tr>

<td colspan="5"

class="text-center">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

</div>

</main>

</div>

<script src="js/khata.js"></script>

</body>

</html>
