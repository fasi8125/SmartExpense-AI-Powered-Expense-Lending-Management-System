<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SmartExpense</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link 
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" 
        rel="stylesheet">

    <!-- Bootstrap -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
        rel="stylesheet">

    <!-- Font Awesome -->
    <link 
        rel="stylesheet" 
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="d-flex align-items-center justify-content-center vh-100 auth-page">
    <div class="card card-highlight glow p-4 fade-in" style="max-width: 360px; width: 100%;">

        <!-- Brand -->
        <div class="text-center mb-3">
            <div class="icon-circle mx-auto mb-2">
                <i class="fa-solid fa-wallet"></i>
            </div>
            <h4 class="fw-semibold mb-1">Welcome Back</h4>
            <p class="text-muted mb-0">Login to manage your expenses</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm">

            <div class="mb-2">
                <label for="loginEmail" class="form-label">Email address</label>
                <input 
                    type="email" 
                    class="form-control" 
                    placeholder="Enter email"
                    id="loginEmail"
                    required
                >
            </div>

            <div class="mb-2">
                <label for="loginPassword" class="form-label">Password</label>
                <input 
                    type="password" 
                    class="form-control" 
                    placeholder="Enter password"
                    id="loginPassword"
                    required
                >
            </div>

            <!-- Dynamic error placeholder -->
            <div 
                id="loginError" 
                class="text-danger small mb-2 d-none">
                Invalid credentials
            </div>

            <button type="submit" class="btn btn-brand w-100 mt-2">
                Login
            </button>
        </form>

        <p class="text-center mt-3 mb-0 small">
            Don't have an account?
            <a href="register.html" class="fw-semibold">Register</a>
        </p>

    </div>
</div>

<script src="js/auth.js"></script>
</body>
</html>
