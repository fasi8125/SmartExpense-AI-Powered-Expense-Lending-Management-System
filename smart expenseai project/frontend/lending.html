<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lending | SmartExpense</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <i class="fa-solid fa-wallet"></i>
      <span>SmartExpense</span>
    </div>

    <nav class="menu">
      <a href="dashboard.html"><i class="fa-solid fa-house"></i> Dashboard</a>
      <a href="add_expense.html"><i class="fa-solid fa-plus"></i> Add Expense</a>
      <a href="auto_import.html"><i class="fa-solid fa-file-import"></i> Auto Import</a>
      <a href="lending.html" class="active">
        <i class="fa-solid fa-users"></i>
        Lending
      </a>
      <a href="reminders.html"><i class="fa-solid fa-bell"></i> Reminders</a>
      <a href="analytics.html"><i class="fa-solid fa-chart-line"></i> Analytics</a>
       <a href="khata.html">
    <i class="fa-solid fa-book"></i>
    Khata
</a>
      <a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a>
    </nav>

    <button id="logoutBtn" class="logout">
      <i class="fa-solid fa-right-from-bracket"></i> Logout
    </button>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">


<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark custom-navbar">
    <div class="container">
        <a class="navbar-brand" href="dashboard.html">SmartExpense</a>
        <a href="dashboard.html" class="btn btn-outline-light btn-sm">Back</a>
    </div>
</nav>

<main class="container my-5 fade-in">

    <!-- PAGE HEADER -->
    <div class="page-header mb-4">
        <h2>Friends & Family Lending</h2>
        <p>Track money you’ve lent and repayments in one place</p>
    </div>

    <!-- SUMMARY CARDS -->
    <div class="row mb-4">
        <div class="col-md-6 mb-3">
            <div class="card p-4 card-highlight glow">
                <h6 class="text-muted">Pending Amount</h6>
                <h3 class="metric" id="pendingAmount">₹0</h3>
            </div>
        </div>
        <div class="col-md-6 mb-3">
            <div class="card p-4">
                <h6 class="text-muted">Repaid Amount</h6>
                <h3 class="metric" id="repaidAmount">₹0</h3>
            </div>
        </div>
    </div>

    <!-- ADD LENDING FORM -->
    <div class="card p-4 mb-4">
        <h5 class="mb-3">
            <i class="fa-solid fa-hand-holding-dollar me-2"></i>
            Add Lending Record
        </h5>

        <form id="lendingForm" class="row g-3">
            <div class="col-md-4">
                <input type="text" id="name" class="form-control" placeholder="Person name" required>
            </div>
            <div class="col-md-3">
                <input type="number" id="amount" class="form-control" placeholder="Amount ₹" required>
            </div>
            <div class="col-md-3">
                <select id="status" class="form-select">
                    <option value="pending">Pending</option>
                    <option value="repaid">Repaid</option>
                </select>
            </div>
            <div class="col-md-2">
                <button class="btn btn-brand w-100">
                    Add
                </button>
            </div>
        </form>
    </div>

    <!-- LENDING LIST -->
    <div class="card p-4">
        <h5 class="mb-3">
            <i class="fa-solid fa-users me-2"></i>
            Lending Records
        </h5>

        <ul class="list-group" id="lendingList">
            <li class="list-group-item text-muted">Loading...</li>
        </ul>
    </div>

</main>
  </main>
</div>


<script src="js/lending.js"></script>
</body>
</html>
