<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | SmartExpense</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link 
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" 
        rel="stylesheet">

    <!-- Bootstrap -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
        rel="stylesheet">

    <!-- Font Awesome -->
    <link 
        rel="stylesheet" 
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container-fluid vh-100 auth-page">
    <div class="row h-100">

        <!-- LEFT BRAND PANEL -->
        
                    <div class="col-md-6 d-none d-md-flex align-items-center auth-left">
                        <div class="text-white px-5 auth-brand-content">
                            <div class="icon-circle icon-lg mb-4">
                    <i class="fa-solid fa-wallet"></i>
                </div>
                <h2 class="fw-semibold mb-3">Smart Expense Manager</h2>
                <p class="opacity-75">
                    Track expenses, manage lending, and get AI-powered insights
                    — all in one secure dashboard.
                </p>
            </div>
        </div>

        <!-- RIGHT REGISTER FORM -->
        <div class="col-md-6 d-flex align-items-center justify-content-center">
            <div class="card card-highlight glow p-4 auth-card fade-in">

                <div class="text-center mb-3">
                    <h4 class="fw-semibold mb-1">Create Account</h4>
                    <p class="text-muted mb-0 small">
                        Get started in less than a minute
                    </p>
                </div>

                <form id="registerForm">

                    <div class="mb-2">
                        <label for="name" class="form-label">Full Name</label>
                        <input 
                            type="text" 
                            class="form-control"
                            placeholder="Enter your name"
                            id="name"
                            required
                        >
                    </div>

                    <div class="mb-2">
                        <label for="email" class="form-label">Email</label>
                        <input 
                            type="email" 
                            class="form-control"
                            placeholder="Enter email"
                            id="email"
                            required
                        >
                    </div>

                    <div class="mb-2">
                        <label for="password" class="form-label">Password</label>
                        <input 
                            type="password" 
                            class="form-control"
                            placeholder="Create password"
                            id="password"
                            required
                        >
                    </div>

                    <div class="mb-2">
                        <label for="confirmPassword" class="form-label">
                            Confirm Password
                        </label>
                        <input 
                            type="password" 
                            class="form-control"
                            placeholder="Re-enter password"
                            id="confirmPassword"
                            required
                        >
                    </div>

                    <!-- Dynamic error placeholder -->
                    <div 
                        id="registerError"
                        class="text-danger small mb-2 d-none">
                        Error message here
                    </div>

                    <button type="submit" class="btn btn-brand w-100 mt-2">
                        Create Account
                    </button>
                </form>

                <p class="text-center mt-3 mb-0 small">
                    Already have an account?
                    <a href="login.html" class="fw-semibold">Login</a>
                </p>

            </div>
        </div>

    </div>
</div>

<script src="js/auth.js"></script>
</body>
</html>
